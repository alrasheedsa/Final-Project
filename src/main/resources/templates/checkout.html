<<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Moyasar Checkout</title>

    <link rel="stylesheet" href="https://cdn.moyasar.com/mpf/1.15.0/moyasar.css"/>
    <script src="https://cdn.moyasar.com/mpf/1.15.0/moyasar.js"></script>
</head>

<body style="font-family: Arial; padding: 40px; background: #f7f7f7;">

<div style="max-width: 520px; margin: auto; background: white; padding: 28px; border-radius: 12px;">
    <h1>Complete Subscription Payment</h1>

    <p>
        <strong>Plan:</strong>
        <span th:text="${planType}"></span>
    </p>

    <p>
        <strong>Amount:</strong>
        <span th:text="${amountSar}"></span> SAR
    </p>

    <hr>

    <div class="mysr-form"></div>
</div>

<script th:inline="javascript">
    Moyasar.init({
        element: '.mysr-form',
        amount: [[${amount}]],
        currency: 'SAR',
        description: [[${description}]],
        publishable_api_key: [[${publishableKey}]],
        callback_url: [[${callbackUrl}]],
        methods: ['creditcard']
    });
</script>

</body>
</html>
