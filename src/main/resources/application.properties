spring.application.name=F-Project
spring.config.import=optional:classpath:application-secrets.properties


spring.datasource.url=jdbc:mysql://localhost:3306/ala_db
spring.datasource.username=root
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.generate-ddl=true
spring.jpa.hibernate.ddl-auto=update

spring.web.error.include-message=always
spring.jackson.serialization.indent-output=true

openai.model=gpt-4o-mini
moyasar.base-url=https://api.moyasar.com/v1
wathq.base-url=https://api.wathq.sa
nominatim.base-url=https://nominatim.openstreetmap.org
osrm.base-url=https://router.project-osrm.org
